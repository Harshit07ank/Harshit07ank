<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sunset-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a050f" />
      <stop offset="50%" stop-color="#12081a" />
      <stop offset="100%" stop-color="#05020a" />
    </linearGradient>
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="50%" stop-color="#ff6633" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2a1236" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffcc33" stop-opacity="0.6"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" fill="url(#sunset-bg)" rx="24" />

  <!-- Animated Sunset Grid (Wireframe) -->
  <g stroke="url(#neon-glow)" stroke-width="0.8" opacity="0.12">
    <!-- Perspective lines radiating out -->
    <line x1="500" y1="180" x2="-200" y2="450" />
    <line x1="500" y1="180" x2="0" y2="450" />
    <line x1="500" y1="180" x2="200" y2="450" />
    <line x1="500" y1="180" x2="400" y2="450" />
    <line x1="500" y1="180" x2="600" y2="450" />
    <line x1="500" y1="180" x2="800" y2="450" />
    <line x1="500" y1="180" x2="1000" y2="450" />
    <line x1="500" y1="180" x2="1200" y2="450" />

    <!-- Horizon grid lines -->
    <line x1="-200" y1="210" x2="1200" y2="210" />
    <line x1="-200" y1="250" x2="1200" y2="250" />
    <line x1="-200" y1="300" x2="1200" y2="300" />
    <line x1="-200" y1="360" x2="1200" y2="360" />
  </g>

  <!-- Glowing Sunset Sun -->
  <circle cx="500" cy="180" r="90" fill="#ff3366" opacity="0.1" filter="url(#glow)" />
  <circle cx="500" cy="180" r="60" fill="#ff6633" opacity="0.18" filter="url(#glow)" />
  
  <!-- Glowing Border -->
  <rect x="2" y="2" width="996" height="396" fill="none" stroke="url(#border-glow)" stroke-width="2" rx="22" />

  <!-- Code / Abstract Terminal elements on the Left -->
  <g transform="translate(60, 60)">
    <!-- Terminal Control Circles -->
    <circle cx="10" cy="0" r="6" fill="#ff5f56" />
    <circle cx="28" cy="0" r="6" fill="#ffbd2e" />
    <circle cx="46" cy="0" r="6" fill="#27c93f" />

    <text x="0" y="50" font-family="'Courier New', monospace" font-size="15" fill="#ff5e36" font-weight="bold">
      $ cat config.json
    </text>

    <!-- JSON config style list -->
    <g transform="translate(0, 90)" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.85">
      <text x="0" y="0" fill="#ff3366">{</text>
      <text x="20" y="25">"name": <tspan fill="#ffcc33">"Harshit Tyagi"</tspan>,</text>
      <text x="20" y="50">"role": <tspan fill="#ffcc33">"Software Engineer"</tspan>,</text>
      <text x="20" y="75">"domains": <tspan fill="#ff3366">[</tspan></text>
      <text x="40" y="100" fill="#ffcc33">"Distributed Systems",</text>
      <text x="40" y="125" fill="#ffcc33">"Creative Tech &amp; WebGL",</text>
      <text x="40" y="150" fill="#ffcc33">"AI Systems &amp; RAG"</text>
      <text x="20" y="175" fill="#ff3366">]</tspan></text>
      <text x="0" y="200" fill="#ff3366">}</text>
    </g>
  </g>

  <!-- Giant typography on the Right -->
  <g transform="translate(540, 160)">
    <!-- Glowing background behind name -->
    <text x="0" y="0" font-family="'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="4">
      HARSHIT
    </text>
    <text x="0" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="900" fill="url(#neon-glow)" letter-spacing="4">
      TYAGI
    </text>
    <text x="0" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#a599b5" letter-spacing="2">
      SOFTWARE ARCHITECTURE • CREATIVE TECH
    </text>

    <!-- Glowing accent lines -->
    <line x1="0" y1="130" x2="360" y2="130" stroke="url(#neon-glow)" stroke-width="3" rx="1.5" filter="url(#glow)" />
  </g>
</svg>