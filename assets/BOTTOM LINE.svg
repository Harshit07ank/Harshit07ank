<?xml version="1.0" standalone="no"?>
<svg id="bottom-svg" viewBox="0 0 1600 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Reverse the gradient for the bottom line so it feels like a continuous loop -->
                <linearGradient id="pastelGradientBottom" x1="100%" y1="0%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#E9D5FF"/>
                    <stop offset="50%" stop-color="#FBCFE8"/>
                    <stop offset="100%" stop-color="#BAE6FD"/>
                </linearGradient>

                <filter id="gentleGlowBottom" x="-20%" y="-50%" width="140%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur1"/>
                    <feGaussianBlur stdDeviation="8" result="blur2"/>
                    <feComponentTransfer in="blur2" result="softBlur">
                        <feFuncA type="linear" slope="0.6"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode in="softBlur"/>
                        <feMergeNode in="blur1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- 
                Main Trace Bottom - Y coordinates inverted (starts at 55, dips to 85)
                Extended wide center (250 to 1350).
            -->
            <path id="mainTraceBottom" d="M 0 55 &#10;                   L 250 55 &#10;                   C 325 55, 325 85, 400 85 &#10;                   L 1200 85 &#10;                   C 1275 85, 1275 55, 1350 55 &#10;                   L 1600 55" stroke="url(#pastelGradientBottom)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#gentleGlowBottom)"/>

            <!-- Bottom Animations -->
            <ellipse rx="45" ry="5" fill="#FBCFE8" opacity="0.15" filter="url(#gentleGlowBottom)">
                <animate attributeName="opacity" values="0.05;0.25;0.05" dur="3s" repeatCount="indefinite"/>
                <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTraceBottom"/>
                </animateMotion>
            </ellipse>

            <ellipse rx="18" ry="2.5" fill="#FAF5FF" opacity="0.7" filter="url(#gentleGlowBottom)">
                <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2s" repeatCount="indefinite"/>
                <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTraceBottom"/>
                </animateMotion>
            </ellipse>
        </svg>