<?xml version="1.0" standalone="no"?>
<svg id="top-svg" class="svg-frame top" viewBox="0 0 1600 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Simplified, elegant Pastel Gradient -->
                <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#C5A3FF"/>   <!-- Soft Purple -->
                    <stop offset="50%" stop-color="#FF9CEE"/>  <!-- Soft Pink -->
                    <stop offset="100%" stop-color="#85E6FF"/> <!-- Soft Cyan -->
                </linearGradient>

                <!-- Refined Soft Glow -->
                <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur1"/>
                    <feGaussianBlur stdDeviation="8" result="blur2"/>
                    <feMerge>
                        <feMergeNode in="blur2"/>
                        <feMergeNode in="blur1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Main Trace Line with elongated flat edges -->
            <!-- M0 88 (Start) -> H600 (Longer flat) -> L700 20 (Dip) -> H900 (Bottom flat) -> L1000 88 (Rise) -> H1600 (End) -->
            <path id="mainTrace" d="M0 88 L300 88 L400 20 L1200 20 L1300 88 L1600 88" stroke="url(#pastelGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softGlow)"/>

            <!-- Subtle Core of Pulse -->
            <ellipse rx="30" ry="5" fill="#ffffff" opacity="0.5" filter="url(#softGlow)">
                <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTrace"/>
                </animateMotion>
            </ellipse>

            <!-- Bright Inner Energy Pulse -->
            <ellipse rx="15" ry="1.5" fill="#ffffff" filter="url(#softGlow)">
                <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTrace"/>
                </animateMotion>
            </ellipse>
        </svg>