<?xml version="1.0" standalone="no"?>
<svg id="bottom-svg" viewBox="0 0 1600 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="skyGradientBottom" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#E0F2FE"/>
                    <stop offset="50%" stop-color="#0EA5E9"/>
                    <stop offset="100%" stop-color="#E0F2FE"/>
                </linearGradient>

                <filter id="softGlowBottom" x="-20%" y="-50%" width="140%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur1"/>
                    <feGaussianBlur stdDeviation="12" result="blur2"/>
                    <feMerge>
                        <feMergeNode in="blur2"/>
                        <feMergeNode in="blur1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- 
                Main Trace Bottom - Drawn manually inverted so it downloads correctly.
                Starts flat at Y=45, curves down to Y=95 smoothly, goes flat, curves back up to Y=45.
            -->
            <path id="mainTraceBottom" d="M 0 45 &#10;                   L 550 45 &#10;                   C 600 45, 600 95, 650 95 &#10;                   L 950 95 &#10;                   C 1000 95, 1000 45, 1050 45 &#10;                   L 1600 45" stroke="url(#skyGradientBottom)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softGlowBottom)"/>

            <!-- Animations referencing the bottom path -->
            <ellipse rx="40" ry="6" fill="#7DD3FC" opacity="0.3" filter="url(#softGlowBottom)">
                <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTraceBottom"/>
                </animateMotion>
            </ellipse>

            <ellipse rx="20" ry="2" fill="#FFFFFF" filter="url(#softGlowBottom)">
                <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTraceBottom"/>
                </animateMotion>
            </ellipse>
        </svg>