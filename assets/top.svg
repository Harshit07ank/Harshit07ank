<?xml version="1.0" standalone="no"?>
<svg id="top-svg" viewBox="0 0 1600 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="skyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#E0F2FE"/>   <!-- Very Light Blue -->
                    <stop offset="50%" stop-color="#0EA5E9"/>  <!-- Core Sky Blue -->
                    <stop offset="100%" stop-color="#E0F2FE"/> <!-- Very Light Blue -->
                </linearGradient>

                <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur1"/>
                    <feGaussianBlur stdDeviation="12" result="blur2"/>
                    <feMerge>
                        <feMergeNode in="blur2"/>
                        <feMergeNode in="blur1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- 
                Main Trace Line - Wider length, much shallower height.
                Starts flat at Y=85, curves up gently to Y=55, goes flat for longer, curves back down.
            -->
            <path id="mainTrace" d="M 0 85 &#10;                   L 450 85 &#10;                   C 525 85, 525 55, 600 55 &#10;                   L 1000 55 &#10;                   C 1075 55, 1075 85, 1150 85 &#10;                   L 1600 85" stroke="url(#skyGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softGlow)"/>

            <!-- Soft background pulse -->
            <ellipse rx="40" ry="6" fill="#7DD3FC" opacity="0.3" filter="url(#softGlow)">
                <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTrace"/>
                </animateMotion>
            </ellipse>

            <!-- Bright inner core of the pulse -->
            <ellipse rx="20" ry="2" fill="#FFFFFF" filter="url(#softGlow)">
                <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
                <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#mainTrace"/>
                </animateMotion>
            </ellipse>
        </svg>